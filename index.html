<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>校園美食地圖 | 攤位管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    body {
      background: #fff5f8;
      padding: 2rem 1.5rem;
      color: #5e3a4a;
    }

    /* 主容器 */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 標題區 */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #e86f8f, #f5a9b8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-block;
      border-bottom: 3px solid #f5a9b8;
      padding-bottom: 6px;
    }

    .header p {
      color: #b5768a;
      margin-top: 8px;
      font-weight: 500;
    }

    /* 表單卡片 */
    .form-card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
      padding: 1.6rem 2rem;
      margin-bottom: 2rem;
      border: 1px solid #ffe0e8;
      transition: all 0.2s;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin-bottom: 1.2rem;
    }

    .input-group {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #c95a7c;
      letter-spacing: 0.5px;
    }

    .input-group label .required {
      color: #e86f8f;
      margin-left: 4px;
    }

    .input-group input, 
    .input-group textarea {
      border: 1.5px solid #fad0db;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.95rem;
      background-color: #fffbfd;
      transition: 0.2s;
      outline: none;
      resize: vertical;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #f5a9b8;
      box-shadow: 0 0 0 3px rgba(245, 169, 184, 0.2);
    }

    .btn-submit {
      background: #e86f8f;
      border: none;
      color: white;
      font-weight: bold;
      padding: 10px 28px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 28px;
      align-self: flex-end;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .btn-submit:hover {
      background: #d45576;
      transform: scale(0.97);
    }

    /* 過濾器工具欄 */
    .filter-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      background: #fff0f4;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
    }

    .filter-group {
      display: flex;
      gap: 10px;
      background: white;
      padding: 4px;
      border-radius: 48px;
      border: 1px solid #ffd3df;
    }

    .filter-btn {
      background: transparent;
      border: none;
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: 0.2s;
      color: #b57189;
    }

    .filter-btn.active {
      background: #e86f8f;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .stats-badge {
      background: #ffe3ec;
      padding: 6px 18px;
      border-radius: 28px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #c55679;
    }

    /* 卡片清單 - 網格 */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.8rem;
    }

    /* 卡片本體 */
    .shop-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      border-left: 10px solid #f5a9b8;
      display: flex;
      flex-direction: column;
    }

    /* done 狀態卡片特殊樣式: 暫停營業 */
    .shop-card.done {
      border-left-color: #d4b0bb;
      background: #fef7f9;
      opacity: 0.85;
      filter: grayscale(0.02);
    }

    .shop-card.done .card-header {
      background: #f9edf2;
    }

    .card-header {
      padding: 1rem 1.4rem;
      background: #fff5f8;
      border-bottom: 1px solid #ffe6ee;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }

    .shop-name {
      font-size: 1.35rem;
      font-weight: 800;
      color: #6e3b50;
      letter-spacing: -0.3px;
    }

    .status-badge {
      font-size: 0.7rem;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 50px;
      background: #d9f0da;
      color: #3c7843;
    }

    .shop-card.done .status-badge {
      background: #ecdde4;
      color: #a15e77;
    }

    .card-body {
      padding: 1.2rem 1.4rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.92rem;
    }

    .info-icon {
      font-weight: 600;
      min-width: 70px;
      color: #d47292;
    }

    .info-text {
      color: #5e3a4a;
      word-break: break-word;
      line-height: 1.4;
    }

    .food-highlight {
      background: #ffeef4;
      padding: 8px 12px;
      border-radius: 20px;
      margin-top: 4px;
      font-size: 0.85rem;
      color: #c74f74;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      padding: 0.8rem 1.4rem 1.2rem;
      gap: 12px;
      border-top: 1px solid #fae6ef;
      margin-top: 6px;
    }

    .toggle-btn {
      background: none;
      border: 1.5px solid #fad0db;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.8rem;
      color: #cc6b8a;
    }

    .toggle-btn:hover {
      background: #ffe4ed;
      border-color: #e86f8f;
    }

    .delete-btn {
      background: none;
      border: 1.5px solid #fad0db;
      padding: 6px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #cc6b8a;
      transition: 0.2s;
    }

    .delete-btn:hover {
      background: #ffe4ed;
      border-color: #e86f8f;
      color: #d45576;
    }

    .empty-message {
      text-align: center;
      grid-column: 1 / -1;
      background: #fff5f8;
      padding: 3rem;
      border-radius: 48px;
      color: #c97d99;
      font-weight: 500;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.75rem;
      color: #d49eb2;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .form-card {
        padding: 1.2rem;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
        border-radius: 28px;
      }
      .filter-group {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🍜 校園美食地圖</h1>
    <p>探索校園攤位｜紀錄你的口袋名單</p>
  </div>

  <!-- 新增表單 -->
  <div class="form-card">
    <form id="shopForm">
      <div class="form-row">
        <div class="input-group">
          <label>🏪 店鋪名稱 <span class="required">*</span></label>
          <input type="text" id="shopName" placeholder="例: 阿婆滷味攤" autocomplete="off" required>
        </div>
        <div class="input-group">
          <label>📍 校園位置 <span class="required">*</span></label>
          <input type="text" id="location" placeholder="例: 活動中心二樓 / 圖書館旁" autocomplete="off" required>
        </div>
      </div>
      <div class="form-row">
        <div class="input-group">
          <label>🍽️ 招牌美食與價格 (選填)</label>
          <textarea id="foodInfo" rows="2" placeholder="例: 招牌乾拌麵 $55 / 麻辣燙 $70 / 珍珠奶茶 $35"></textarea>
        </div>
      </div>
      <div style="display: flex; justify-content: flex-end;">
        <button type="submit" class="btn-submit">＋ 新增美食攤位</button>
      </div>
    </form>
  </div>

  <!-- 篩選列 -->
  <div class="filter-bar">
    <div class="filter-group">
      <button type="button" data-filter="all" class="filter-btn active">全部攤位</button>
      <button type="button" data-filter="active" class="filter-btn">營業中 (active)</button>
      <button type="button" data-filter="done" class="filter-btn">暫停營業 (done)</button>
    </div>
    <div class="stats-badge" id="statsInfo"></div>
  </div>

  <!-- 卡片清單區塊 -->
  <div id="cardsContainer" class="cards-grid">
    <div class="empty-message">✨ 還沒有攤位，新增第一間校園美食吧！</div>
  </div>
  <footer>📌 點擊按鈕切換營業狀態 • 資料自動儲存於瀏覽器</footer>
</div>

<script>
  // ======================= 全域變數 =======================
  let records = [];            // 所有美食攤位資料
  let currentFilter = "all";  // 'all', 'active', 'done'
  const STORAGE_KEY = "records";

  // DOM 元素
  const form = document.getElementById("shopForm");
  const shopNameInput = document.getElementById("shopName");
  const locationInput = document.getElementById("location");
  const foodInfoInput = document.getElementById("foodInfo");
  const container = document.getElementById("cardsContainer");
  const statsSpan = document.getElementById("statsInfo");

  // ======================= 核心函式 (依 contract) =======================
  
  /** loadData(): 從 localStorage 載入資料，初始化 records 陣列 */
  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      try {
        records = JSON.parse(stored);
        // 確保每筆 record 有必要的欄位 (資料完整性)
        records = records.filter(item => item && typeof item === 'object').map(item => ({
          id: item.id || Date.now() + '-' + Math.random(),
          createdAt: item.createdAt || new Date().toISOString(),
          status: (item.status === 'active' || item.status === 'done') ? item.status : 'active',
          shopName: item.shopName || "",
          location: item.location || "",
          foodInfo: item.foodInfo || ""
        }));
      } catch(e) {
        console.warn("讀取 localStorage 失敗", e);
        records = [];
      }
    } else {
      // 不加入任何寫死的假資料，維持空陣列
      records = [];
    }
  }

  /** saveData(records): 將整個 records 陣列儲存到 localStorage */
  function saveData(recordsArray) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recordsArray));
  }

  /** createRecord(formData): 新增一筆 record，回傳新增的完整 record 物件 */
  function createRecord(formData) {
    const newRecord = {
      id: Date.now() + '-' + Math.random().toString(36).substring(2, 10),
      createdAt: new Date().toISOString(),
      status: "active",
      shopName: formData.shopName.trim(),
      location: formData.location.trim(),
      foodInfo: formData.foodInfo ? formData.foodInfo.trim() : ""
    };
    records.unshift(newRecord);   // 最新顯示在上方
    saveData(records);
    return newRecord;
  }

  /** updateRecord(id, changes): 根據 id 更新特定欄位 (如 status) */
  function updateRecord(id, changes) {
    const index = records.findIndex(r => r.id === id);
    if (index !== -1) {
      records[index] = { ...records[index], ...changes };
      saveData(records);
      return true;
    }
    return false;
  }

  /** renderList(recordsToShow): 根據傳入的資料陣列繪製卡片清單 */
  function renderList(recordsToShow) {
    // 更新統計數字 (用全部 records 計算)
    const total = records.length;
    const activeCount = records.filter(r => r.status === "active").length;
    const doneCount = records.filter(r => r.status === "done").length;
    statsSpan.innerHTML = `📊 總計 ${total} 攤 ｜ 🟢 營業 ${activeCount} ｜ ⚫ 暫停 ${doneCount}`;

    // 更新 filter 按鈕 active 樣式
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const filterVal = btn.getAttribute('data-filter');
      if (filterVal === currentFilter) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    // 空狀態處理
    if (recordsToShow.length === 0) {
      let emptyMsg = "";
      if (currentFilter === "active") emptyMsg = "🌟 目前沒有『營業中』的攤位，新增一間或切換篩選吧！";
      else if (currentFilter === "done") emptyMsg = "⏸️ 目前沒有『暫停營業』的攤位";
      else emptyMsg = "🍽️ 還沒有任何美食攤位，使用上方表單新增第一間吧！";
      container.innerHTML = `<div class="empty-message">${emptyMsg}</div>`;
      return;
    }

    // 產生卡片 HTML
    let cardsHtml = "";
    for (let shop of recordsToShow) {
      const isDone = shop.status === "done";
      const cardStatusClass = isDone ? "done" : "";
      const statusText = isDone ? "暫停營業" : "營業中";
      const statusIcon = isDone ? "⏸️" : "🟢";

      const foodDisplay = shop.foodInfo && shop.foodInfo.trim() !== "" 
        ? `<div class="food-highlight">🍴 ${escapeHtml(shop.foodInfo)}</div>` 
        : `<div class="food-highlight" style="background:#fef0f5; color:#ce7c9a;">✨ 無提供資訊</div>`;

      cardsHtml += `
        <div class="shop-card ${cardStatusClass}" data-id="${shop.id}">
          <div class="card-header">
            <span class="shop-name">${escapeHtml(shop.shopName)}</span>
            <span class="status-badge">${statusIcon} ${statusText}</span>
          </div>
          <div class="card-body">
            <div class="info-row">
              <span class="info-icon">📍 位置</span>
              <span class="info-text">${escapeHtml(shop.location)}</span>
            </div>
            <div class="info-row">
              <span class="info-icon">🍽️ 招牌美食</span>
              <span class="info-text">${foodDisplay}</span>
            </div>
            <div class="info-row">
              <span class="info-icon">📅 新增於</span>
              <span class="info-text">${formatDate(shop.createdAt)}</span>
            </div>
          </div>
          <div class="card-actions">
            <button class="toggle-btn" data-id="${shop.id}" data-action="toggle">${isDone ? "🔄 恢復營業" : "⏸️ 暫停營業"}</button>
            <button class="delete-btn" data-id="${shop.id}" data-action="delete">🗑️ 刪除</button>
          </div>
        </div>
      `;
    }
    container.innerHTML = cardsHtml;

    // 綁定卡片內部按鈕事件
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        if (id) {
          const targetRecord = records.find(r => r.id === id);
          if (targetRecord) {
            const newStatus = targetRecord.status === "active" ? "done" : "active";
            updateRecord(id, { status: newStatus });
            refreshByCurrentFilter();
          }
        }
      });
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        if (id && confirm("確定要刪除此美食攤位嗎？")) {
          records = records.filter(r => r.id !== id);
          saveData(records);
          refreshByCurrentFilter();
        }
      });
    });
  }

  // ======================= 輔助函式 =======================
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function formatDate(isoString) {
    if (!isoString) return "未知時間";
    try {
      const date = new Date(isoString);
      if (isNaN(date.getTime())) return "無效日期";
      return `${date.getFullYear()}/${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
    } catch(e) {
      return "近期新增";
    }
  }

  /** 依據 currentFilter 取得要顯示的 records */
  function getFilteredRecords() {
    if (currentFilter === "active") {
      return records.filter(r => r.status === "active");
    } else if (currentFilter === "done") {
      return records.filter(r => r.status === "done");
    }
    return [...records];
  }

  /** 刷新畫面 (根據當前篩選條件呼叫 renderList) */
  function refreshByCurrentFilter() {
    const filtered = getFilteredRecords();
    renderList(filtered);
  }

  /** 切換篩選條件並刷新 */
  function setFilter(filter) {
    if (filter === 'all' || filter === 'active' || filter === 'done') {
      currentFilter = filter;
      refreshByCurrentFilter();
    }
  }

  // ======================= 表單處理 =======================
  function handleFormSubmit(e) {
    e.preventDefault();
    const shopName = shopNameInput.value;
    const location = locationInput.value;
    const foodInfo = foodInfoInput.value;

    // 必填驗證
    if (!shopName || !shopName.trim()) {
      alert("請填寫店鋪名稱 (必填)");
      return;
    }
    if (!location || !location.trim()) {
      alert("請填寫校園位置 (必填)");
      return;
    }

    const formData = {
      shopName: shopName,
      location: location,
      foodInfo: foodInfo || ""
    };
    
    createRecord(formData);
    
    // 清空表單
    shopNameInput.value = "";
    locationInput.value = "";
    foodInfoInput.value = "";
    shopNameInput.focus();
    
    // 新增後，若當前篩選不是全部則自動切換到「全部」以便看到新攤位 (符合直覺)
    if (currentFilter !== 'all') {
      setFilter('all');
    } else {
      refreshByCurrentFilter();
    }
  }

  // ======================= 初始化 & 事件綁定 =======================
  function bindFilterEvents() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const filterValue = btn.getAttribute('data-filter');
        if (filterValue) setFilter(filterValue);
      });
    });
  }

  function init() {
    loadData();               // 從 localStorage 讀取 records
    bindFilterEvents();      // 綁定篩選按鈕
    form.addEventListener('submit', handleFormSubmit);
    currentFilter = "all";   // 預設顯示全部
    refreshByCurrentFilter(); // 初次渲染
  }

  // 啟動應用
  init();
</script>
</body>
</html>
